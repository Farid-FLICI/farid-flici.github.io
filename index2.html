<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farid Flici – Scopus-like Profile</title>

  <!-- Fonts: Roboto (very Scopus-like) -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --dark-blue: #001F3F;
      --green: #2ECC71;
      --black: #000000;
      --white: #FFFFFF;
      --gray: #34495E;
      --light-gray: #ECF0F1;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--white);
      color: var(--black);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header – Scopus-style profile banner */
    header {
      background: var(--dark-blue);
      color: var(--white);
      padding: 4rem 0 3rem;
      text-align: center;
    }

    .profile {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 2rem;
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid var(--green);
      box-shadow: var(--shadow);
    }

    .profile-info h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .profile-info .subtitle {
      font-size: 1.35rem;
      opacity: 0.9;
      margin-bottom: 0.8rem;
    }

    .affiliations {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* Navigation – Scopus-like horizontal menu */
    nav {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin: 1.5rem 0 3rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--white);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      transition: all 0.3s;
    }

    nav a:hover {
      background: var(--green);
      color: var(--black);
    }

    /* Main content */
    main {
      padding: 2rem 0;
    }

    section {
      background: var(--white);
      border-radius: 12px;
      padding: 2.5rem;
      margin: 2rem 0;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--green);
    }

    h2 {
      font-size: 1.9rem;
      color: var(--dark-blue);
      margin-bottom: 1.4rem;
      border-bottom: 2px solid var(--green);
      padding-bottom: 0.6rem;
      display: inline-block;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    ul li {
      margin: 1rem 0;
      padding-left: 1.8rem;
      position: relative;
      color: var(--text-light);
    }

    ul li::before {
      content: "•";
      color: var(--green);
      position: absolute;
      left: 0;
      font-size: 1.5rem;
      line-height: 1;
    }
