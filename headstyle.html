<style>
:root {
  --primary:#001f3f;
  --green:#2ecc71;
  --light:#f7f9fb;
  --white:#ffffff;
  --shadow:0 8px 25px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Roboto',sans-serif;
  background:var(--light);
  color:#222;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:0 1.5rem;
}

/* HERO */
header{
   background: linear-gradient(135deg, #001f3f 0%, #003366 100%);

  color:white;
  padding:1.5rem 0;
}

.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:1.5rem;
}

.hero-text{
  max-width:700px;
}

.hero-text h1{
  font-size:2rem;
}

.subtitle{
  margin:0.25rem 0;
}

.tagline{
  margin:1rem 0;
  opacity:0.9;
}

.quick-links a{
  color:white;
  margin-right:1rem;
  text-decoration:none;
}

.quick-links a:hover{
  color:var(--green);
}

.hero img{
  width:135px;
  height:135px;
  border-radius:50%;
  border:4px solid var(--green);
}

  .social-icons {
  display: flex;
  align-items: center;
  gap: 14px;          /* spacing between icons */
  flex-wrap: wrap;    /* optional: wrap on small screens */ 
  margin-top: 1rem;
}

 .social-icons a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin-right: 12px;
  color: white;                 /* default = white */
  transition: all 0.3s ease;
  text-decoration: none;
} 

/* Hover colors */
.social-icons a.orcid:hover {  color: #a6ce39;}
.icon-svg{  width:20px;  height:20px;  fill:white;  transition:0.3s;}
.social-icons a.scopus:hover .icon-svg{  fill:#f36f21;}
.social-icons a.wos:hover .icon-svg{  fill:#8f3a84;}
.social-icons a.scholar:hover {  color: #4285F4;}
.social-icons a.rg:hover {  color: #00ccbb;}
.social-icons a.github:hover {  color: #333;}
.social-icons a.linkedin:hover {  color: #0077b5;}
.social-icons a.twitter:hover {  color: #000000; /* X style */}
.social-icons a.youtube:hover  { color: #cd201f; }

  /* Optional: subtle animation */
.social-icons a:hover {  transform: translateY(-2px) scale(1.1);}
  
/* NAV */
nav{
  position:sticky;
  top:0;
  background:var(--primary);
  padding:0.8rem;
  display:flex;
  justify-content:center;
  gap:1.5rem;
  z-index:1000;
}

nav a{
  color:white;
  text-decoration:none;
}

nav a:hover{
  color:var(--green);
}

/* SECTIONS */
section{
  margin:2rem 0;
}

h2{
  color:var(--primary);
  margin-bottom:1rem;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:1.5rem;
}

/* CARD */
.card{
  background:white;
  padding:1.5rem;
  border-radius:12px;
  box-shadow:var(--shadow);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* TWO COLUMN */
.two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
}

@media(max-width:768px){
  .hero{flex-direction:column;text-align:center;}
  .two-col{grid-template-columns:1fr;}
}

/* FOOTER */
footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:2rem;
  margin-top:3rem;
}

  /* RESEARCH LAYOUT */
.research-block{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:2rem;
  align-items:center;
  margin-bottom:2.5rem;
}

.research-block.reverse{
  grid-template-columns: 1fr 2fr;
}

.research-text p{
  margin-bottom:1rem;
}

.research-plot img{
  width:100%;
  border-radius:10px;
  box-shadow:var(--shadow);
}

/* SECTION BACKGROUND ALT */
.alt-bg{
  background:var(--white);
  padding:2rem;
  border-radius:12px;
}

/* BUTTONS */
.btn{
  display:inline-block;
  margin-top:1rem;
  margin-right:0.8rem;
  padding:0.5rem 1rem;
  background:var(--primary);
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-size:0.9rem;
}

.btn:hover{
  background:var(--green);
  color:black;
}

/* ROLE CARDS */
.roles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1.5rem;
}

.role-card{
  background:white;
  padding:1.5rem;
  border-radius:12px;
  box-shadow:var(--shadow);
  text-align:center;
}

.role-card h3{
  margin-bottom:0.5rem;
  color:var(--primary);
}

@media(max-width:768px){
  .research-block,
  .research-block.reverse{
    grid-template-columns:1fr;
  }
}
</style>
